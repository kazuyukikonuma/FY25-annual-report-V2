<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>FY25 事業実績ダッシュボード</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{
  --bg:#fff;--bg2:#f7f6f3;--bg3:#efede8;
  --text1:#1a1916;--text2:#6b6860;--text3:#9c9a94;
  --border:#e2dfd8;--border2:#ccc9c0;
  --green:#1d7a5f;--green-bg:#edf5f2;
  --amber:#96600a;--amber-bg:#fdf4e7;
  --red:#b83a2e;--red-bg:#fdf0ee;
  --font:-apple-system,BlinkMacSystemFont,"Helvetica Neue","Hiragino Sans","Noto Sans CJK JP",sans-serif;
  --mono:"SF Mono","Menlo","Consolas","Courier New",monospace;
  --c-gk:#A8C5DA;--c-gk-d:#4A7A9B;
  --c-st:#E8A598;--c-st-d:#B05040;
  --c-lc:#C5B4E3;--c-lc-d:#7A5AAB;
  --c-hb:#A8D5B5;--c-hb-d:#3A8A55;
  --c-mr:#F5D4A0;--c-mr-d:#C07820;
  --c-ky:#F5A8A0;--c-ky-d:#B83A2E;
  --c-ot:#D4C5B0;--c-ot-d:#8A7A60;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg3);font-family:var(--font);font-size:12.5px;color:var(--text1)}
.wrap{max-width:1100px;margin:0 auto;background:var(--bg);box-shadow:0 0 0 1px var(--border);min-height:100vh}
.hdr{position:sticky;top:0;z-index:100;background:var(--bg);border-bottom:1px solid var(--border);padding:10px 16px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.hdr-main .title{font-size:13px;font-weight:600}.hdr-main .sub{font-size:11px;color:var(--text2);margin-top:2px}
.lang-btn{display:flex;gap:4px}
.lang-btn button{border:1px solid var(--border2);background:var(--bg2);color:var(--text2);padding:4px 10px;border-radius:4px;cursor:pointer;font-size:11px;font-family:var(--font)}
.lang-btn button.on{background:#1a1916;color:#fff;border-color:#1a1916}
.tab-bar{display:flex;overflow-x:auto;border-bottom:1px solid var(--border);padding:0 12px;background:var(--bg)}
.tab-bar::-webkit-scrollbar{height:0}
.tab-btn{padding:9px 13px;font-size:12px;border:none;background:none;cursor:pointer;color:var(--text2);white-space:nowrap;border-bottom:2.5px solid transparent;font-family:var(--font)}
.tab-btn.on{color:var(--text1);border-bottom-color:#FFB7C5;font-weight:600;background:#fff8f9}
.tab-btn:hover:not(.on){color:var(--text1);background:var(--bg2)}
.pane{display:none;padding:16px}.pane.on{display:block}
.kpi-strip{display:grid;grid-template-columns:repeat(auto-fit,minmax(145px,1fr));gap:10px;margin-bottom:16px}
.kpi{background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:12px}
.kpi-lbl{font-size:11px;color:var(--text2);margin-bottom:4px}
.kpi-val{font-size:21px;font-weight:300;font-family:var(--mono);letter-spacing:-0.02em}
.kpi-sub{font-size:10.5px;color:var(--text3);margin-top:3px}
.pos{color:var(--green)}.neg{color:var(--red)}.neutral{color:var(--text1)}
.cw{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:14px;margin-bottom:14px}
.ct{font-size:13px;font-weight:500;margin-bottom:10px;color:var(--text1)}
.cn{font-size:11px;color:var(--text3);margin-top:6px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
@media(max-width:640px){.grid2{grid-template-columns:1fr}}
.tbl-wrap{overflow-x:auto;margin-bottom:6px}
table{width:100%;border-collapse:collapse;font-size:12px}
th{font-size:11px;color:var(--text3);font-weight:400;padding:6px 8px;border-bottom:1px solid var(--border2);text-align:left;white-space:nowrap}
th.r{text-align:right}
td{padding:6px 8px;border-bottom:1px solid var(--border)}
td.r{text-align:right;font-family:var(--mono);font-size:12px;white-space:nowrap}
tr:hover td{background:var(--bg2)}
.tr-total td{font-weight:700;border-top:1.5px solid var(--border2);border-bottom:1.5px solid var(--border2);background:var(--bg2)}
.tr-sub td{font-weight:600;border-top:1px solid var(--border);background:var(--bg3);font-size:11.5px}
.tr-neg td{background:var(--red-bg)}
.sbar{display:flex;gap:5px;margin-bottom:12px;flex-wrap:wrap}
.sb{padding:5px 12px;font-size:11.5px;border:1px solid var(--border);border-radius:4px;cursor:pointer;background:var(--bg2);color:var(--text2);font-family:var(--font)}
.sb.on{background:#B5EAD7;border-color:#7EC8A0;color:#1a1916;font-weight:600}
.comp-type{padding:4px 10px;font-size:11.5px;border:1px solid var(--border2);border-radius:4px;cursor:pointer;background:var(--bg3);color:var(--text2);font-family:var(--font)}
.comp-type.on{background:var(--bg2);color:var(--text1);font-weight:600;border-color:var(--border2)}
.sp{display:none}.sp.on{display:block}
.ins{border:1px solid var(--border);border-radius:6px;margin-top:14px;overflow:hidden}
.ins-h{padding:10px 14px;cursor:pointer;font-size:12.5px;color:var(--text2);background:var(--bg2);user-select:none;display:flex;justify-content:space-between}
.ins-h:hover{background:var(--bg3)}
.ins-b{display:none;padding:14px;font-size:12px;line-height:1.75;border-top:1px solid var(--border)}
.ins-b p{margin-bottom:8px}.ins-b p:last-child{margin-bottom:0}
.scen{padding:12px;background:var(--green-bg);border-radius:6px;margin-top:8px}
.scen-row{display:flex;align-items:baseline;gap:8px;margin-bottom:8px}
.scen-row:last-child{margin-bottom:0}
.scen-num{font-size:20px;font-weight:300;font-family:var(--mono);color:var(--green)}
.scen-lbl{font-size:12px;color:var(--text1)}
.funnel-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.funnel-lbl{font-size:11px;color:var(--text2);width:90px;text-align:right;flex-shrink:0}
.funnel-bar{height:22px;border-radius:3px;display:flex;align-items:center;padding:0 8px;font-size:11px;font-weight:600;font-family:var(--mono);color:#fff;min-width:50px;transition:width .5s}
.funnel-n{font-size:11px;color:var(--text2);margin-left:6px;font-family:var(--mono)}

/* ── LANDING PAGE ── */
#landing{
  position:fixed;inset:0;z-index:9999;
  background:var(--bg);
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:24px 20px;
  overflow-y:auto;
  transition:opacity 0.5s ease,visibility 0.5s ease;
}
#landing.hide{opacity:0;visibility:hidden;pointer-events:none;}
#landing .ld-inner{
  max-width:860px;width:100%;
  display:flex;flex-direction:column;
  gap:0;
}
/* eyebrow */
#landing .ld-eyebrow{
  font-size:10px;letter-spacing:0.18em;text-transform:uppercase;
  color:var(--text3);font-family:var(--mono);
  margin-bottom:14px;
  opacity:0;animation:ldUp 0.5s 0.1s ease forwards;
}
/* title */
#landing .ld-title{
  font-size:clamp(22px,4vw,38px);font-weight:300;
  line-height:1.15;letter-spacing:-0.015em;
  color:var(--text1);margin-bottom:6px;
  opacity:0;animation:ldUp 0.5s 0.2s ease forwards;
}
#landing .ld-title strong{font-weight:700;}
/* sub */
#landing .ld-sub{
  font-size:12px;color:var(--text2);margin-bottom:28px;
  opacity:0;animation:ldUp 0.5s 0.3s ease forwards;
}
/* divider */
#landing .ld-divider{
  height:1px;background:var(--border);margin-bottom:24px;
  opacity:0;animation:ldUp 0.4s 0.35s ease forwards;
}
/* chapter label */
#landing .ld-ch-label{
  font-size:10px;letter-spacing:0.12em;text-transform:uppercase;
  color:var(--text3);font-family:var(--mono);
  margin-bottom:12px;
  opacity:0;animation:ldUp 0.4s 0.4s ease forwards;
}
/* chapter grid */
#landing .ld-grid{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:8px;
  margin-bottom:28px;
  opacity:0;animation:ldUp 0.5s 0.45s ease forwards;
}
@media(max-width:700px){#landing .ld-grid{grid-template-columns:repeat(2,1fr);}}
@media(min-width:701px) and (max-width:900px){#landing .ld-grid{grid-template-columns:repeat(3,1fr);}}

#landing .ld-card{
  background:var(--bg2);border:1px solid var(--border);border-radius:6px;
  padding:12px 12px 10px;
  cursor:pointer;text-decoration:none;color:inherit;
  display:block;transition:background 0.15s,border-color 0.15s,transform 0.15s;
  position:relative;overflow:hidden;
}
#landing .ld-card::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:2.5px;
  background:var(--card-accent,#FFB7C5);opacity:0;transition:opacity 0.15s;
}
#landing .ld-card:hover{background:var(--bg3);border-color:var(--border2);transform:translateY(-2px);}
#landing .ld-card:hover::after{opacity:1;}
#landing .ld-card-num{
  font-family:var(--mono);font-size:9.5px;color:var(--text3);
  letter-spacing:0.08em;margin-bottom:6px;
}
#landing .ld-card-icon{font-size:18px;margin-bottom:5px;display:block;line-height:1;}
#landing .ld-card-title{font-size:11.5px;font-weight:600;color:var(--text1);line-height:1.3;}

/* enter button */
#landing .ld-enter{
  opacity:0;animation:ldUp 0.5s 0.6s ease forwards;
  display:flex;align-items:center;justify-content:space-between;
  flex-wrap:wrap;gap:12px;
}
#landing .ld-btn{
  display:inline-flex;align-items:center;gap:8px;
  background:#1a1916;color:#fff;
  border:none;padding:11px 24px;
  font-size:12.5px;font-weight:600;font-family:var(--font);
  border-radius:5px;cursor:pointer;
  transition:opacity 0.15s,transform 0.15s;
  letter-spacing:0.02em;
}
#landing .ld-btn:hover{opacity:0.82;transform:translateY(-1px);}
#landing .ld-footer-note{font-size:10.5px;color:var(--text3);font-family:var(--mono);}

/* animation */
@keyframes ldUp{
  from{opacity:0;transform:translateY(14px);}
  to{opacity:1;transform:translateY(0);}
}
/* wrap hidden on load */
#main-wrap{opacity:0;transition:opacity 0.4s ease;}
#main-wrap.show{opacity:1;}
</style>
</head>
<body>

<!-- ══ LANDING PAGE ══ -->
<div id="landing">
  <div class="ld-inner">
    <div class="ld-eyebrow" id="ld-ey"></div>
    <h1 class="ld-title" id="ld-title"></h1>
    <p class="ld-sub" id="ld-sub"></p>
    <div class="ld-divider"></div>
    <div class="ld-ch-label" id="ld-ch-label"></div>
    <div class="ld-grid" id="ld-grid"></div>
    <div class="ld-enter">
      <button class="ld-btn" onclick="enterDashboard()" id="ld-btn"></button>
      <div class="ld-footer-note" id="ld-note"></div>
    </div>
  </div>
</div>

<!-- ══ MAIN DASHBOARD ══ -->
<div id="main-wrap">
<div class="wrap">

<div class="hdr">
  <div class="hdr-main">
    <div class="title" data-k="ttl"></div>
    <div class="sub" data-k="sub"></div>
  </div>
  <div class="lang-btn">
    <button onclick="showLanding()" style="display:inline-flex;align-items:center;gap:4px;padding:4px 10px;font-size:11px;color:var(--text2);border:1px solid var(--border2);border-radius:4px;background:none;cursor:pointer;font-family:var(--font);transition:all 0.15s;margin-right:6px" onmouseover="this.style.color='var(--text1)';this.style.borderColor='var(--border)'" onmouseout="this.style.color='var(--text2)';this.style.borderColor='var(--border2)'">⌂ TOP</button>
    <button onclick="setL('ja')" id="bja">日本語</button>
    <button onclick="setL('zh')" id="bzh" class="on">繁體中文</button>
  </div>
</div>

<div class="tab-bar" id="tabs"></div>

<div id="t1" class="pane on"></div>
<div id="t2" class="pane"></div>
<div id="t3" class="pane"></div>
<div id="t4" class="pane"></div>
<div id="t5" class="pane"></div>
<div id="t6" class="pane"></div>
<div id="t7" class="pane"></div>
<div id="t8" class="pane"></div>
<div id="t9" class="pane"></div>
<div id="t10" class="pane"></div>

</div><!-- /.wrap -->
</div><!-- /#main-wrap -->

      {num:'10',icon:'💰',title:'費用結構',tab:'t10',accent:'#F5A8A0'},
    ]
  }
};

function renderLanding(lang){
  const d=LD[lang||'zh'];
  document.getElementById('ld-ey').textContent=d.ey;
  document.getElementById('ld-title').innerHTML=d.title.replace('\n','<br>');
  document.getElementById('ld-sub').textContent=d.sub;
  document.getElementById('ld-ch-label').textContent=d.chlabel;
  document.getElementById('ld-btn').textContent=d.btn;
  document.getElementById('ld-note').textContent=d.note;
  const grid=document.getElementById('ld-grid');
  grid.innerHTML='';
  d.cards.forEach(c=>{
    const a=document.createElement('a');
    a.className='ld-card';
    a.href='#';
    a.style.setProperty('--card-accent',c.accent);
    a.innerHTML=`<div class="ld-card-num">CH.${c.num}</div><span class="ld-card-icon">${c.icon}</span><div class="ld-card-title">${c.title}</div>`;
    a.addEventListener('click',function(e){
      e.preventDefault();
      enterDashboard(c.tab);
    });
    grid.appendChild(a);
  });
}

function enterDashboard(tabId){
  const landing=document.getElementById('landing');
  const wrap=document.getElementById('main-wrap');
  landing.classList.add('hide');
  wrap.classList.add('show');
  document.body.style.overflow='';
  if(tabId) showTab(tabId);
}

function showLanding(){
  const landing=document.getElementById('landing');
  const wrap=document.getElementById('main-wrap');
  // reset animations by re-cloning
  landing.classList.remove('hide');
  wrap.classList.remove('show');
  document.body.style.overflow='hidden';
  // re-trigger animations
  const els=landing.querySelectorAll('[style*="animation"],.ld-eyebrow,.ld-title,.ld-sub,.ld-divider,.ld-ch-label,.ld-grid,.ld-enter');
  els.forEach(el=>{el.style.animation='none';el.offsetHeight;el.style.animation='';});
}

/* init on load */
document.addEventListener('DOMContentLoaded',function(){
  renderLanding('zh');
  document.body.style.overflow='hidden';
});

let LANG='zh';
const CHART_INSTANCES={};

const M=v=>((v/1e6).toFixed(1));
const fmtN=v=>{if(v>=0)return '+'+M(v)+'M';return '▲'+M(Math.abs(v))+'M';};
const fmtNTD=v=>{const m=Math.abs(v)/1e6;const s=m.toFixed(1)+'M';return v<0?'▲'+s:s;};
const pct=(a,b)=>(b?((a/b)*100).toFixed(1)+'%':'—');
function el(id){return document.getElementById(id)}
function t(k){return T[LANG][k]||k}
// 管道ラベル変換（zh表示時に「その他」→「其他」等）
const CH_LABEL_MAP={zh:{'その他':'其他','舞台劇':'舞台劇','授權':'授權','經銷商':'經銷商'}};
function chLbl(key){return(LANG==='zh'&&CH_LABEL_MAP.zh[key])||key;}
function applyI18n(){
  document.querySelectorAll('[data-k]').forEach(e=>{const k=e.dataset.k;if(T[LANG][k]!==undefined)e.textContent=T[LANG][k];});
  document.documentElement.lang=LANG==='ja'?'ja':'zh-TW';
}
function setL(l){
  LANG=l;
  el('bja').className=l==='ja'?'on':'';
  el('bzh').className=l==='zh'?'on':'';
  applyI18n();
  buildAllContent();
  initAllCharts();
  renderLanding(l);
}
function showTab(id){
  document.querySelectorAll('.pane').forEach(p=>p.classList.remove('on'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('on'));
  el(id).classList.add('on');
  document.querySelectorAll('.tab-btn')[['t1','t2','t8','t9','t10','t3','t4','t6','t7','t5'].indexOf(id)].classList.add('on');
  initChartsFor(id);
}
function showSub(grp,id){
  document.querySelectorAll('.sp[data-g='+grp+']').forEach(p=>p.classList.remove('on'));
  document.querySelectorAll('.sb[data-g='+grp+']').forEach(b=>b.classList.remove('on'));
  el(id).classList.add('on');
  document.querySelector('.sb[data-sid='+id+']').classList.add('on');
  if(grp==='t6s')initT6();
  else if(grp==='t10s')initT10();
  else initChartsFor('t2');
}
function toggleIns(el){const b=el.nextElementSibling;if(!b)return;b.style.display=b.style.display==='block'?'none':'block';const arrow=el.querySelector('span');if(arrow)arrow.childNodes[0].textContent=(b.style.display==='block'?'▼ ':'▶ ');}
function mkChart(id,cfg){
  if(CHART_INSTANCES[id]){CHART_INSTANCES[id].destroy();delete CHART_INSTANCES[id];}
  const c=el(id);if(!c)return;
  try{CHART_INSTANCES[id]=new Chart(c,cfg);}catch(e){c.parentElement.innerHTML='<p style="color:var(--text3);padding:12px">グラフ読込失敗</p>';}
}
function valLbl(clr,fsz,fmt){return{id:'valLbl',afterDatasetsDraw(chart){chart.data.datasets.forEach((ds,di)=>{const meta=chart.getDatasetMeta(di);meta.data.forEach((bar,i)=>{const v=ds.data[i];if(v===null||v===undefined||Array.isArray(v)||v===0)return;const ctx=chart.ctx;ctx.save();ctx.fillStyle=clr||'#1a1916';ctx.font=(fsz||'10px')+' '+'SF Mono,Consolas,monospace';ctx.textAlign='center';ctx.textBaseline='bottom';const x=bar.x,y=bar.y;let txt;if(fmt)txt=fmt(v);else if(Math.abs(v)>=1e5)txt=M(v)+'M';else txt=typeof v==='number'?v.toFixed(0):String(v);ctx.fillText(txt,x,y-2);ctx.restore();});});}};}

function buildChOpts(bizId){return(COMP_CH[bizId]||[]).map(c=>'<option value="'+c+'">'+chLbl(c)+'</option>').join('');}
function addCompSeries(){
  if(compSeries.length>=6)return;
  const biz=el('sel-biz').value;const ch=el('sel-ch').value;
  if(compSeries.find(s=>s.biz===biz&&s.ch===ch))return;
  const nm={gk:LANG==='ja'?'学習':'學習',hb:LANG==='ja'?'周辺':'周邊',mr:'Mirafeel'};
  compSeries.push({biz,ch,label:nm[biz]+'×'+ch,clr:COMP_CLRS[compSeries.length]});
  drawCompChart();
}
function removeCompSeries(i){compSeries.splice(i,1);compSeries.forEach((s,j)=>s.clr=COMP_CLRS[j]);drawCompChart();}
function clearCompSeries(){compSeries=[];drawCompChart();}
function setCompType(tp){
  compType=tp;
  ['line','bar'].forEach(t=>{const b=el('ctype-'+t);if(b)b.className='comp-type'+(t===tp?' on':'');});
  drawCompChart();
}
function drawCompChart(){
  const tags=el('comp-tags');const hint=el('comp-hint');
  if(tags)tags.innerHTML=compSeries.map((s,i)=>'<span style="padding:3px 10px;background:'+s.clr+';border-radius:12px;font-size:11px;color:#333">'+s.label+'<span onclick="removeCompSeries('+i+')" style="cursor:pointer;margin-left:5px;color:#666">×</span></span>').join('');
  if(hint)hint.style.display=compSeries.length?'none':'block';
  if(!compSeries.length){if(CHART_INSTANCES['cvs-comp']){CHART_INSTANCES['cvs-comp'].destroy();delete CHART_INSTANCES['cvs-comp'];}return;}
  const isBar=compType==='bar';
  const datasets=compSeries.map(s=>{
    const chData=D.mByCh[s.biz];
    const vals=s.ch==='全体'?D.mLbl.map((_,i)=>Object.values(chData).reduce((a,arr)=>a+(arr[i]||0),0)):(chData[s.ch]||D.mLbl.map(()=>0));
    return{label:s.label,data:vals,borderColor:s.clr,backgroundColor:s.clr+(isBar?'cc':'44'),borderWidth:2,tension:0.3,pointRadius:3,fill:false,stack:isBar?'s':undefined};
  });

function buildPLTable(){
  const names=D.plNames[LANG];
  const bizRows=D.pl.filter(r=>r.id!=='ky');
  const subtotalRev=bizRows.reduce((a,r)=>a+r.rev,0);
  const subtotalProfit=bizRows.reduce((a,r)=>a+r.profit,0);
  let h=`<table><thead><tr><th>${t('col_biz')}</th><th class="r">${t('col_rev')}</th><th class="r">${t('col_gp')}</th><th class="r">${t('col_gpr')}</th><th class="r">${t('col_opex')}</th><th class="r">${t('col_hc')}</th><th class="r">${t('col_gm')}</th><th class="r">${t('col_op')}</th><th class="r">${t('col_opr')}</th></tr></thead><tbody>`;
  D.pl.forEach((r,i)=>{
    const costr=r.rev?pct(r.cost,r.rev):'—';
    const opr=r.rev?pct(r.profit,r.rev):'—';
    const pc=r.profit>=0?'pos':'neg';
    const isKy=r.id==='ky';
    if(isKy){
      const stOpr=pct(subtotalProfit,subtotalRev);
      h+=`<tr class="tr-sub"><td colspan="1"><strong>${t('col_subtotal')}</strong></td><td class="r"><strong>${fmtNTD(subtotalRev)}</strong></td><td class="r">—</td><td class="r">—</td><td class="r">—</td><td class="r">—</td><td class="r">—</td><td class="r pos"><strong>${fmtNTD(subtotalProfit)}</strong></td><td class="r pos"><strong>${stOpr}</strong></td></tr>`;
    }
    h+=`<tr class="${isKy?'tr-neg':(r.profit<0?'':'')}"><td>${names[i]}</td><td class="r">${r.rev?fmtNTD(r.rev):'—'}</td><td class="r">${r.cost?fmtNTD(r.cost):'—'}</td><td class="r">${costr}</td><td class="r">${r.opex?fmtNTD(-r.opex):'—'}</td><td class="r">${r.hc?fmtNTD(-r.hc):'—'}</td><td class="r">${r.gm?fmtNTD(-r.gm):'—'}</td><td class="r ${pc}">${fmtNTD(r.profit)}</td><td class="r">${r.rev?opr:'—'}</td></tr>`;
  });
  const totalRev=D.pl.reduce((a,r)=>a+r.rev,0);
  const totalOp=D.pl.reduce((a,r)=>a+r.profit,0);
  h+=`<tr class="tr-total"><td>${LANG==='ja'?'合計':'合計'}</td><td class="r">${fmtNTD(totalRev)}</td><td class="r">—</td><td class="r">—</td><td class="r">—</td><td class="r">—</td><td class="r">—</td><td class="r neg">${fmtNTD(totalOp)}</td><td class="r">—</td></tr>`;
  h+=`</tbody></table>`;
  el('tbl-pl').innerHTML=h;
}

function buildT4(){
  const p=el('t4');
  const mdTotal=D.licCat.md.reduce((a,v)=>a+v,0);
  const anTotal=D.licCat.an.reduce((a,v)=>a+v,0);
  const ld=D.licDetail;
  const fy25Active=ld.filter(v=>v.fy25>0);
  const selfTotal=ld.filter(v=>v.div==='自社').reduce((a,v)=>a+v.fy25,0);
  const agentTotal=ld.filter(v=>v.div==='好園地').reduce((a,v)=>a+v.fy25,0);
  const newV=ld.filter(v=>v.fy24===0&&v.fy25>0).length;
  const exitV=ld.filter(v=>v.fy24>0&&v.fy25===0).length;

  const mLbl=['4月','5月','6月','7月','8月','9月','10月','11月','12月','1月','2月'];
  const mLbl_zh=['4月','5月','6月','7月','8月','9月','10月','11月','12月','1月','2月'];
  const top12=ld.filter(v=>v.fy25>0).slice(0,12);
  const maxV=Math.max(...top12.flatMap(v=>v.fy25m));
  function hClr(v){
    if(!v)return'';
    const i=Math.min(v/maxV,1);
    const a=(0.1+i*0.75).toFixed(2);
    return`background:rgba(197,180,227,${a})`;
  }
  const lbls=LANG==='ja'?mLbl:mLbl_zh;
  let heatHtml=`<div class="tbl-wrap"><table style="font-size:11px"><thead><tr>
    <th>${LANG==='ja'?'廠商':'廠商'}</th>
    <th>${LANG==='ja'?'区分':'區分'}</th>
    ${lbls.map(m=>`<th class="r" style="font-size:10px">${m}</th>`).join('')}
    <th class="r">${LANG==='ja'?'合計':'合計'}</th>
  </tr></thead><tbody>`;
  top12.forEach(v=>{
    const divLbl=v.div==='自社'?(LANG==='ja'?'自社':'自社'):(LANG==='ja'?'好園地':'好園地');
    const divClr=v.div==='自社'?'#A8C5DA':'#C5B4E3';
    heatHtml+=`<tr>
      <td style="white-space:nowrap;font-size:11px">${v.n}</td>
      <td><span style="background:${divClr};border-radius:3px;padding:1px 5px;font-size:9.5px">${divLbl}</span></td>
      ${v.fy25m.map(m=>`<td class="r" style="${hClr(m)};font-family:var(--mono);font-size:10px">${m?Math.round(m/1000)+'K':''}</td>`).join('')}
      <td class="r" style="font-family:var(--mono);font-weight:600">${fmtNTD(v.fy25)}</td>
    </tr>`;
  });
  heatHtml+=`</tbody></table></div>`;
  heatHtml+=`<div class="cn" data-k="c4_heat_n"></div>`;

  const yoyRows=ld.filter(v=>v.fy24>0||v.fy25>0).sort((a,b)=>b.fy25-a.fy25);
  let yoyHtml=`<div class="tbl-wrap"><table style="font-size:11.5px"><thead><tr>
    <th>${LANG==='ja'?'廠商':'廠商'}</th>
    <th class="r">FY24</th><th class="r">FY25</th>
    <th class="r">${LANG==='ja'?'増減':'增減'}</th>
    <th class="r">${LANG==='ja'?'前年比':'同期比'}</th>
    <th>${LANG==='ja'?'支払パターン':'付款模式'}</th>
  </tr></thead><tbody>`;
  yoyRows.forEach(v=>{
    const diff=v.fy25-v.fy24;
    const yoy=v.fy24>0?(v.fy25/v.fy24*100).toFixed(0)+'%':(LANG==='ja'?'新規':'新規');
    const diffStr=diff>0?`<span class="pos">+${fmtNTD(diff)}</span>`:`<span class="neg">▲${fmtNTD(Math.abs(diff))}</span>`;
    const patMap={regular:t('c4_pat_reg'),spot:t('c4_pat_spt'),oneshot:t('c4_pat_one')};
    const patClr={regular:'#B5EAD7',spot:'#FFF4A3',oneshot:'#F5A8A0'};
    yoyHtml+=`<tr>
      <td>${v.n}</td>
      <td class="r">${v.fy24?fmtNTD(v.fy24):'—'}</td>
      <td class="r">${v.fy25?fmtNTD(v.fy25):'—'}</td>
      <td class="r">${v.fy25||v.fy24?diffStr:'—'}</td>
      <td class="r">${yoy}</td>
      <td><span style="background:${patClr[v.pat]};border-radius:3px;padding:1px 5px;font-size:9.5px">${patMap[v.pat]}</span></td>
    </tr>`;
  });
  yoyHtml+=`</tbody></table></div>`;

  p.innerHTML=`
  <div class="kpi-strip">
    ${kpiCard(LANG==='ja'?'授權金総収入（11ヶ月）':'授權金總收入（11個月）','23.3M',t('kpi_unit'))}
    ${kpiCard(t('c4md'),M(mdTotal)+'M','89%','pos')}
    ${kpiCard(t('c4an'),M(anTotal)+'M','11%','neutral')}
    ${kpiCard(LANG==='ja'?'廠商数（取引あり）':'廠商數（有交易）','20',LANG==='ja'?'社':'家')}
    ${kpiCard(LANG==='ja'?'新規廠商（FY25）':'新規廠商（FY25）',newV+'社',LANG==='ja'?'FY24にない廠商':'FY24無此廠商','pos')}
  </div>

  <div class="grid2">
    <div class="cw"><div class="ct" data-k="c4ven"></div><div style="height:280px"><canvas id="cvs-lic-v" role="img" aria-label="License Vendor Top8"></canvas></div></div>
    <div class="cw">
      <div class="ct" data-k="c4_div"></div>
      <div style="height:140px"><canvas id="cvs-lic-div" role="img" aria-label="自社vs好園地"></canvas></div>
      <div class="cn" data-k="c4_div_n" style="margin-top:6px"></div>
      <div style="margin-top:10px"><div class="ct" data-k="c4_pat"></div>
      <div style="height:110px"><canvas id="cvs-lic-pat" role="img" aria-label="付款模式別"></canvas></div></div>
    </div>
  </div>
  <div class="cw"><div class="ct" data-k="c4mon"></div><div style="height:230px"><canvas id="cvs-lic-m" role="img" aria-label="License Monthly"></canvas></div><div class="cn" data-k="c4n"></div></div>

  <div class="ins" style="margin-bottom:8px">
    <div class="ins-h" onclick="toggleIns(this)" style="background:var(--bg3)">
      <span>▶ <span data-k="c4_yoy"></span></span>
      <span style="font-size:10px;color:var(--text3)" data-k="open_hint"></span>
    </div>
    <div class="ins-b" style="padding:10px">${yoyHtml}</div>
  </div>

  <div class="ins" style="margin-bottom:8px">
    <div class="ins-h" onclick="toggleIns(this)" style="background:var(--bg3)">
      <span>▶ <span data-k="c4_heat"></span></span>
      <span style="font-size:10px;color:var(--text3)" data-k="open_hint"></span>
    </div>
    <div class="ins-b" style="padding:10px">${heatHtml}</div>
  </div>

  <div class="ins"><div class="ins-h" onclick="toggleIns(this)"><span>▶ ${t('insight')}</span><span style="font-size:10px;color:var(--text3)">${t('open_hint')}</span></div><div class="ins-b">${t('ins4')}</div></div>`;
  applyI18n();
}

function vendorTable(rows, reducible){

  rows.forEach(r=>{

    h+=`<tr><td style="font-size:11.5px">${r.n}</td><td class="r">${fmtNTD(r.v)}</td><td style="font-size:10.5px;color:var(--text3)">${note}</td></tr>`;

function buildT5(){
  const k=D.kyotsu;
  const p=el('t5');
  const names=D.plNames[LANG];
  const cm=D.costMatrix;
  const colHds=LANG==='ja'
    ?['事業','原価','営業費用','一般管理費','人件費','費用合計']
    :['事業','原價','營業費用','一般管理費','人件費','費用合計'];
  const allVals=[...cm.cost,...cm.opex,...cm.gm,...cm.hc].filter(v=>v>0);
  const maxVal=Math.max(...allVals);
  function heatClr(v){
    if(!v||v<=0)return'var(--bg)';
    const intensity=Math.min(v/maxVal,1);
    const alpha=(0.08+intensity*0.55).toFixed(2);
    return`rgba(180,100,80,${alpha})`;
  }
  function heatTxt(v){
    if(!v||v<=0)return'<span style="color:var(--text3)">—</span>';
    const intensity=Math.min(v/maxVal,1);
    const clr=intensity>0.4?'#5c1a10':'#8b3a2a';
    return`<span style="font-family:var(--mono);color:${clr}">${fmtNTD(v)}</span>`;
  }
  let tbl=`<table><thead><tr>${colHds.map((c,i)=>`<th${i>0?' class="r"':''}>${c}</th>`).join('')}</tr></thead><tbody>`;
  cm.bizIds.forEach((id,i)=>{
    const cost=cm.cost[i];const opex=cm.opex[i];const gm=cm.gm[i];const hc=cm.hc[i];
    const total=Math.abs(cost)+Math.abs(opex)+Math.abs(gm)+Math.abs(hc);
    const isKy=id==='ky';
    const rowStyle=isKy?' style="background:var(--red-bg);font-weight:600"':'';
    tbl+=`<tr${rowStyle}>
      <td>${names[D.pl.findIndex(r=>r.id===id)]}</td>
      <td class="r" style="background:${heatClr(cost)}">${heatTxt(cost)}</td>
      <td class="r" style="background:${heatClr(opex)}">${heatTxt(opex)}</td>
      <td class="r" style="background:${heatClr(gm)}">${heatTxt(gm)}</td>
      <td class="r" style="background:${heatClr(hc)}">${heatTxt(hc)}</td>
      <td class="r" style="font-family:var(--mono);font-weight:600">${fmtNTD(-total)}</td>
    </tr>`;
  });
  tbl+=`</tbody></table>`;

  p.innerHTML=`

  <div class="cw"><div class="ct" data-k="c5_kyotsu"></div><div style="height:260px"><canvas id="cvs-cost-wf" role="img" aria-label="共通費ウォーターフォール">人件費28M 一般管理費46.6M 営業費用24.6M 成本戻り+7.6M 合計▲91.6M</canvas></div><div class="cn" data-k="c5note"></div></div>

  const revBiz=D.pl.filter(r=>r.rev>0&&r.id!=='ky');
  const showLbl=['gk','st','lc','hb','mr'];
  const donutLbls=revBiz.map(r=>D.plNames[LANG][D.pl.indexOf(r)]);
  mkChart('cvs-rev-donut',{type:'doughnut',data:{
    labels:donutLbls,
    datasets:[{data:revBiz.map(r=>r.rev),backgroundColor:revBiz.map(r=>r.clr),borderWidth:1,borderColor:'#fff'}]
  },options:{...baseOpts,plugins:{
    legend:{display:true,position:'right',labels:{font:{size:10},color:'#6b6860',padding:5,boxWidth:10}},
    tooltip:{callbacks:{label:ctx=>ctx.label+': '+M(ctx.raw)+'M'}}
  }},plugins:[{id:'dnutLbl',afterDatasetsDraw(chart){
    const {ctx}=chart;
    const meta=chart.getDatasetMeta(0);
    const ds=chart.data.datasets[0];
    const total=ds.data.reduce((a,v)=>a+v,0);
    meta.data.forEach((arc,i)=>{
      const biz=revBiz[i];
      if(!showLbl.includes(biz.id))return;
      const v=ds.data[i];
      const pct=(v/total*100).toFixed(1)+'%';
      const nm=D.plNames[LANG][D.pl.indexOf(biz)];
      const ma=(arc.startAngle+arc.endAngle)/2;
      const inArc=v/total>0.05;
      const rad=inArc?(arc.outerRadius+arc.innerRadius)/2:arc.outerRadius+24;
      const x=arc.x+Math.cos(ma)*rad;
      const y=arc.y+Math.sin(ma)*rad;
      ctx.save();
      if(!inArc){
        ctx.strokeStyle='#ccc9c0';ctx.lineWidth=0.8;
        ctx.beginPath();
        ctx.moveTo(arc.x+Math.cos(ma)*(arc.outerRadius+2),arc.y+Math.sin(ma)*(arc.outerRadius+2));
        ctx.lineTo(x,y);ctx.stroke();
        ctx.fillStyle='#6b6860';
        ctx.font='8.5px -apple-system,BlinkMacSystemFont,sans-serif';
        ctx.textAlign=Math.cos(ma)>0.1?'left':Math.cos(ma)<-0.1?'right':'center';
        ctx.textBaseline='middle';
        ctx.fillText(nm+' '+pct,x+(Math.cos(ma)>0?3:-3),y);
      } else {
        const cx=arc.x+Math.cos(ma)*(arc.outerRadius+arc.innerRadius)/2;
        const cy=arc.y+Math.sin(ma)*(arc.outerRadius+arc.innerRadius)/2;
        ctx.fillStyle='rgba(255,255,255,0.92)';
        ctx.font='bold 9px -apple-system,BlinkMacSystemFont,sans-serif';
        ctx.textAlign='center';ctx.textBaseline='middle';
        ctx.fillText(nm,cx,cy-6);
        ctx.font='9px SF Mono,Consolas,monospace';
        ctx.fillText(pct,cx,cy+6);
      }
      ctx.restore();
    });
  }}]});

  const mbiz=D.pl.filter(r=>r.rev>0&&r.id!=='ky');
  const mnames=mbiz.map((_,i)=>D.plNames[LANG][D.pl.indexOf(mbiz[i])]);
  mkChart('cvs-margin',{type:'bar',data:{
    labels:mnames,
    datasets:[{data:mbiz.map(r=>+(r.profit/r.rev*100).toFixed(1)),backgroundColor:mbiz.map(r=>r.profit>=0?r.clr:'#fca5a5'),borderWidth:0}]
  },options:{...baseOpts,
    scales:{
      x:{grid:{display:false},ticks:{color:'#9c9a94',font:{size:9.5}}},
      y:{grid:{color:'#e2dfd8'},ticks:{color:'#9c9a94',font:{size:10},callback:v=>v+'%'}}
    },plugins:{...baseOpts.plugins,tooltip:{callbacks:{label:ctx=>(ctx.raw>0?'+':'')+ctx.raw+'%'}}}},
    plugins:[valLbl('#1a1916','9.5px',v=>(v>0?'+':v<0?'▲':'')+Math.abs(v).toFixed(1)+'%')]
  });

  const jpyLbls=t('jpy_biz');
  const jpyRevClr=['#A8C5DA','#E8A598','#C5B4E3','#D4C5B0','#B5EAD7','#6b6860'];
  const jpyEbiClr=['#4A7A9B','#B05040','#7A5AAB','#F5A8A0','#3A8A55','#b83a2e'];
  mkChart('cvs-jpy',{type:'bar',
    data:{labels:jpyLbls,datasets:[
      {label:t('jpy_rev'),data:D.jpy.rev,backgroundColor:jpyRevClr,borderWidth:0,borderRadius:2},
      {label:t('jpy_ebitda'),data:D.jpy.ebitda,backgroundColor:jpyEbiClr,borderWidth:0,borderRadius:2}
    ]},
    options:{...baseOpts,
      scales:{
        x:{grid:{display:false},ticks:{color:'#9c9a94',font:{size:10}}},
        y:{grid:{color:'#e2dfd8'},ticks:{color:'#9c9a94',font:{size:10},callback:v=>v+'M'},
          title:{display:true,text:'百万円',color:'#9c9a94',font:{size:9}}}
      },
      plugins:{...baseOpts.plugins,
        legend:{display:true,position:'top',labels:{font:{size:10},padding:8,boxWidth:10,color:'#6b6860'}},
        tooltip:{callbacks:{label:ctx=>{const v=ctx.raw;if(v===null)return null;return ctx.dataset.label+': '+(v>=0?'+':'')+v+'M JPY';}}}
      }
    },
    plugins:[{id:'jpyLbl',afterDatasetsDraw(chart){
      chart.data.datasets.forEach((ds,di)=>{
        const meta=chart.getDatasetMeta(di);
        meta.data.forEach((bar,i)=>{
          const v=ds.data[i];
          if(v===null||v===undefined||Math.abs(v)<8)return;
          const ctx=chart.ctx;ctx.save();
          ctx.fillStyle=v>=0?'#1d7a5f':'#b83a2e';
          ctx.font='bold 9px SF Mono,Consolas,monospace';
          ctx.textAlign='center';
          ctx.textBaseline=v>=0?'bottom':'top';
          ctx.fillText((v>=0?'+':v<0?'▲':'')+Math.abs(v),bar.x,v>=0?bar.y-2:bar.y+2);
          ctx.restore();
        });
      });
    }}]
  });
}

function mkSpk(m,clr){
  const w=72,h=22,n=m.length,max=Math.max(...m,1);
  const pts=m.map((v,i)=>(i*(w/(n-1))).toFixed(1)+','+(h-v/max*(h-2)-1).toFixed(1)).join(' ');
  return '<svg width="'+w+'" height="'+h+'" style="vertical-align:middle"><polyline points="'+pts+'" fill="none" stroke="'+clr+'" stroke-width="1.5" stroke-linejoin="round"/></svg>';
}

function initT9(){
  const bd=D.buyer;
  const isJa=LANG==='ja';
  const baseOp={responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}}};

  const patLbls=bd.bizPat.map(p=>p.pat);
  mkChart('cvs-t9-biz',{type:'bar',
    data:{labels:patLbls,datasets:[
      {label:isJa?'平均LTV（NTD）':'平均LTV（NTD）',data:bd.bizPat.map(p=>p.avgLtv),backgroundColor:'#A8C5DA',yAxisID:'y',borderWidth:0,borderRadius:2},
      {label:isJa?'顧客数（右軸）':'客戶數（右軸）',data:bd.bizPat.map(p=>p.cnt),backgroundColor:'rgba(197,180,227,0.5)',yAxisID:'y1',borderWidth:0,borderRadius:2}
    ]},
    options:{...baseOp,
      scales:{
        x:{grid:{display:false},ticks:{color:'#1a1916',font:{size:10}}},
        y:{grid:{color:'#e2dfd8'},ticks:{color:'#4A7A9B',font:{size:10},callback:v=>v.toLocaleString()},title:{display:true,text:'平均LTV (NTD)',color:'#4A7A9B',font:{size:9}}},
        y1:{grid:{display:false},ticks:{color:'#7A5AAB',font:{size:10},callback:v=>v>=1000?(v/1000).toFixed(0)+'K':v},position:'right',title:{display:true,text:isJa?'顧客数':'客戶數',color:'#7A5AAB',font:{size:9}}}
      },
      plugins:{...baseOp.plugins,
        legend:{display:true,position:'top',labels:{font:{size:10},padding:8,boxWidth:10,color:'#6b6860'}},
        tooltip:{callbacks:{label:ctx=>ctx.datasetIndex===0?`平均LTV: ${ctx.raw.toLocaleString()} NTD`:`顧客数: ${ctx.raw.toLocaleString()}人`}}
      }
    }
  });

  const chLbls=bd.chSeg.map(s=>`${s.ch}×${s.bind==='y'?(isJa?'綁定あり':'已綁定'):(isJa?'綁定なし':'未綁定')}`);
  const chRevs=bd.chSeg.map(s=>s.rev);
  const chClrs=['#E8A598','#A8C5DA','#B5D5E8','#C5B4E3','#D4B4E3','#F5D4B0'];
  mkChart('cvs-t9-ch',{type:'doughnut',
    data:{labels:chLbls,datasets:[{data:chRevs,backgroundColor:chClrs,borderWidth:1,borderColor:'#fff'}]},
    options:{...baseOp,plugins:{
      legend:{display:true,position:'right',labels:{font:{size:10},color:'#6b6860',padding:5,boxWidth:10}},
      tooltip:{callbacks:{label:ctx=>`${ctx.label}: ${(ctx.raw/1e6).toFixed(1)}M (${bd.chSeg[ctx.dataIndex].share}%)`}}
    }}
  });

  const fqLbls=bd.freqBind.map(r=>r.tx);
  mkChart('cvs-t9-freq',{type:'bar',
    data:{labels:fqLbls,datasets:[
      {label:isJa?'綁定なし':'未綁定',data:bd.freqBind.map(r=>r.ltv_n),backgroundColor:'#D4C5B0',borderWidth:0,borderRadius:2},
      {label:isJa?'綁定あり':'已綁定',data:bd.freqBind.map(r=>r.ltv_y),backgroundColor:'#A8C5DA',borderWidth:0,borderRadius:2}
    ]},
    options:{...baseOp,
      scales:{
        x:{grid:{display:false},ticks:{color:'#1a1916',font:{size:11}}},
        y:{grid:{color:'#e2dfd8'},ticks:{color:'#9c9a94',font:{size:10},callback:v=>v.toLocaleString()}}
      },
      plugins:{...baseOp.plugins,
        legend:{display:true,position:'top',labels:{font:{size:10},padding:8,boxWidth:10,color:'#6b6860'}},
        tooltip:{callbacks:{label:ctx=>`${ctx.dataset.label}: ${ctx.raw.toLocaleString()} NTD`}}
      }
    },
    plugins:[{id:'fqLbl',afterDatasetsDraw(chart){
      chart.data.datasets.forEach((ds,di)=>{
        chart.getDatasetMeta(di).data.forEach((bar,i)=>{
          const v=ds.data[i];
          const ctx=chart.ctx;ctx.save();
          ctx.fillStyle=di===0?'#8A7A60':'#2a5a8b';
          ctx.font='8.5px SF Mono,Consolas,monospace';
          ctx.textAlign='center';ctx.textBaseline='bottom';
          ctx.fillText(v>=1000?(v/1000).toFixed(0)+'K':v,bar.x,bar.y-2);
          ctx.restore();
        });
      });
    }}]
  });

  const tmLbls=bd.bindTiming.map(r=>r.cat);
  const tmVals=bd.bindTiming.map(r=>r.cnt);
  mkChart('cvs-t9-timing',{type:'doughnut',
    data:{labels:tmLbls,datasets:[{data:tmVals,backgroundColor:['#4A7A9B','#A8C5DA','#B5EAD7'],borderWidth:1,borderColor:'#fff'}]},
    options:{...baseOp,plugins:{
      legend:{display:true,position:'right',labels:{font:{size:11},color:'#6b6860',padding:8,boxWidth:10}},
      tooltip:{callbacks:{label:ctx=>`${ctx.label}: ${ctx.raw.toLocaleString()}人 (${bd.bindTiming[ctx.dataIndex].pct}%)`}}
    }}
  });
}

function initT10(){
  const cd=D.ch10; const isJa=LANG==='ja';
  const activeSub=(document.querySelector('.sp.on[data-g="t10s"]')||{}).id||'t10-cmp';
  const chClr={WEB:'#A8C5DA',TM:'#E8A598',KOL:'#C5B4E3',EC:'#A8D5B5'};

  if(activeSub==='t10-cmp'){
    const chs=['WEB','TM','KOL','EC'];
    const gkPct=chs.map(c=>+(cd[c].biz.gk.rev/(cd[c].rev25)*100).toFixed(1));
    const hbPct=chs.map(c=>+(cd[c].biz.hb.rev/(cd[c].rev25)*100).toFixed(1));
    const mfPct=chs.map(c=>+(cd[c].biz.mf.rev/(cd[c].rev25)*100).toFixed(1));
    mkChart('cvs-t10-biz',{type:'bar',data:{labels:chs,datasets:[
      {label:isJa?'學習商品':'學習商品',data:gkPct,backgroundColor:'#A8C5DA',stack:'s',borderWidth:0},
      {label:isJa?'周邊商品':'周邊商品',data:hbPct,backgroundColor:'#A8D5B5',stack:'s',borderWidth:0},
      {label:'Mirafeel',data:mfPct,backgroundColor:'#F5D4A0',stack:'s',borderWidth:0}
    ]},options:{...baseOpts,indexAxis:'y',scales:{
      x:{stacked:true,grid:{color:'#e2dfd8'},ticks:{color:'#9c9a94',font:{size:10},callback:v=>v+'%'},max:100},
      y:{stacked:true,grid:{display:false},ticks:{color:'#1a1916',font:{size:11}}}
    },plugins:{...baseOpts.plugins,legend:{display:true,position:'top',labels:{font:{size:10},padding:8,boxWidth:10,color:'#6b6860'}},
    tooltip:{callbacks:{label:ctx=>`${ctx.dataset.label}: ${ctx.raw}%`}}}}});

    const gkAov=chs.map(c=>cd[c].biz.gk.aov);
    const hbAov=chs.map(c=>cd[c].biz.hb.aov);
    mkChart('cvs-t10-aov',{type:'bar',data:{labels:chs,datasets:[
      {label:isJa?'學習商品':'學習商品',data:gkAov,backgroundColor:'#A8C5DA',borderWidth:0,borderRadius:2},
      {label:isJa?'周邊商品':'周邊商品',data:hbAov,backgroundColor:'#A8D5B5',borderWidth:0,borderRadius:2}
    ]},options:{...baseOpts,scales:{
      x:{grid:{display:false},ticks:{color:'#1a1916',font:{size:11}}},
      y:{grid:{color:'#e2dfd8'},ticks:{color:'#9c9a94',font:{size:10},callback:v=>v.toLocaleString()}}
    },plugins:{...baseOpts.plugins,legend:{display:true,position:'top',labels:{font:{size:10},padding:8,boxWidth:10,color:'#6b6860'}},
    tooltip:{callbacks:{label:ctx=>`${ctx.dataset.label}: ${ctx.raw.toLocaleString()} NTD`}}}}});

    const lbins=['〜2K','2-4K','4-6K','6-10K','10K+'];
    const lClrs=['#A8C5DA','#E8A598','#C5B4E3'];
    mkChart('cvs-t10-ltv',{type:'bar',data:{labels:lbins,datasets:['WEB','TM','KOL'].map((c,i)=>({
      label:c,data:lbins.map(k=>cd[c].ltvDist?cd[c].ltvDist[k]||0:0),
      backgroundColor:lClrs[i],borderWidth:0,borderRadius:2
    }))},options:{...baseOpts,scales:{
      x:{grid:{display:false},ticks:{color:'#9c9a94',font:{size:10}}},
      y:{grid:{color:'#e2dfd8'},ticks:{color:'#9c9a94',font:{size:10},callback:v=>v>=1000?(v/1000).toFixed(0)+'K':v}}
    },plugins:{...baseOpts.plugins,legend:{display:true,position:'top',labels:{font:{size:10},padding:8,boxWidth:10,color:'#6b6860'}}}}});

    const fbins=['1回','2回','3回','4-5回','6回+'];
    mkChart('cvs-t10-freq',{type:'bar',data:{labels:fbins,datasets:['WEB','TM','KOL'].map((c,i)=>({
      label:c,data:fbins.map(k=>cd[c].freqDist?cd[c].freqDist[k]||0:0),
      backgroundColor:lClrs[i],borderWidth:0,borderRadius:2
    }))},options:{...baseOpts,scales:{
      x:{grid:{display:false},ticks:{color:'#9c9a94',font:{size:10}}},
      y:{grid:{color:'#e2dfd8'},ticks:{color:'#9c9a94',font:{size:10},callback:v=>v>=1000?(v/1000).toFixed(0)+'K':v}}
    },plugins:{...baseOpts.plugins,legend:{display:true,position:'top',labels:{font:{size:10},padding:8,boxWidth:10,color:'#6b6860'}}}}});
  }

  if(activeSub==='t10-kol'){
    const mLbl=['25/04','25/05','25/06','25/07','25/08','25/09','25/10','25/11','25/12','26/01','26/02','26/03'];
    mkChart('cvs-t10-kol',{type:'bar',data:{labels:mLbl,datasets:[{
      data:cd.KOL.monthly,backgroundColor:cd.KOL.monthly.map(v=>v>2000000?'#B05040':'#F5C5B5'),borderWidth:0,borderRadius:2
    }]},options:{...baseOpts,scales:{
      x:{grid:{display:false},ticks:{color:'#9c9a94',font:{size:10}}},
      y:{grid:{color:'#e2dfd8'},ticks:{color:'#9c9a94',font:{size:10},callback:v=>(v/1e6).toFixed(1)+'M'}}
    },plugins:{...baseOpts.plugins,tooltip:{callbacks:{label:ctx=>`${(ctx.raw/1e6).toFixed(2)}M NTD`}}}},
    plugins:[valLbl('#B05040','9px',v=>(v/1e6).toFixed(1)+'M')]});
  }
}

buildAllContent();
initAllCharts();
